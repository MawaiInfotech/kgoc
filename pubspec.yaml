name: trisquare_locus
description: A project for Trisquare

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  http: ^0.13.4
  provider: ^6.0.3
  bloc: ^8.0.3
  flutter_bloc: ^8.0.1
  freezed_annotation: ^2.1.0
  hive: ^2.2.3
  path_provider: ^2.0.11
  json_annotation: ^4.8.1
  intl: ^0.17.0
  dropdown_button2: ^1.7.1
  carousel_slider: ^5.0.0
  curved_navigation_bar: ^1.0.3
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  syncfusion_flutter_datepicker: ^20.2.45
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.0.15
    #  firebase_core: ^1.23.0
    #  firebase_crashlytics: ^2.8.11
    #  firebase_messaging: ^13.0.2
  #  firebase_core: ^1.22.0
  time_range: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  freezed: ^2.1.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/kgoc.png"
  remove_alpha_ios: true


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/

  # example:
  fonts:
    - family: Schyler
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
dependency_overrides:
  logging: 1.2.0